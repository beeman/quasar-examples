concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

name: Examples CI

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-programs:
    outputs:
      count: ${{ steps.programs.outputs.count }}
      programs: ${{ steps.programs.outputs.programs }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install just
        uses: taiki-e/install-action@e2e0361851db6f65641f0511b8a8c1c1170b3ee1 # just

      - id: programs
        name: Discover programs
        shell: bash
        run: |
          set -euo pipefail

          programs_json="$(just programs | python3 -c 'import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"
          programs_count="$(printf '%s' "$programs_json" | python3 -c 'import json, sys; print(len(json.load(sys.stdin)))')"

          {
            echo "count=$programs_count"
            echo 'programs<<EOF'
            echo "$programs_json"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  test-program:
    if: ${{ needs.discover-programs.outputs.count != '0' }}
    name: ${{ matrix.program }}
    needs: discover-programs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install just
        uses: taiki-e/install-action@e2e0361851db6f65641f0511b8a8c1c1170b3ee1 # just

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12

      - name: Setup Quasar
        uses: beeman/setup-quasar@d793579509f8bc9a6f45ba22837fe2c64f8bb361 # v1.0.1

      - name: Install package dependencies
        shell: bash
        run: |
          set -euo pipefail

          cd "${{ matrix.program }}"

          if [ -f package.json ]; then
            if [ -f bun.lock ]; then
              bun install --frozen-lockfile
            else
              bun install
            fi
          fi

      - name: Build program
        run: just build-one "${{ matrix.program }}"

      - name: Test program
        run: just test-one "${{ matrix.program }}"
    strategy:
      fail-fast: false
      matrix:
        program: ${{ fromJSON(needs.discover-programs.outputs.programs) }}
